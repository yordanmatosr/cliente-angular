<p-toast />

<div class="guru-wrap">
    <div class="guru-register-card">

        <!-- Header -->
        <div class="flex items-center gap-3 mb-6">
            <img src="/img/guru-logo.png" alt="GURU" class="guru-logo" />
            <span class="guru-brand">GURU</span>
            <span class="text-muted-color text-sm ml-auto">Already have an account?
                <a routerLink="/guru" class="guru-link">Log in</a>
            </span>
        </div>

        <h2 class="text-xl font-bold mb-1" style="color: #2a3a4f">Register User</h2>
        <p class="text-sm mb-6" style="color: #5b677a">
            After registration an email will be sent with your login credentials.
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex flex-col gap-1">
                <label class="text-sm font-medium">First Name</label>
                <input pInputText [(ngModel)]="form.firstname" maxlength="50" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-sm font-medium">Middle Name</label>
                <input pInputText [(ngModel)]="form.middlename" maxlength="50" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-sm font-medium">Last Name</label>
                <input pInputText [(ngModel)]="form.lastname" maxlength="50" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-sm font-medium">Email <span class="text-red-500">*</span></label>
                <input pInputText type="email" [(ngModel)]="form.email" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-sm font-medium">Username <span class="text-red-500">*</span></label>
                <input pInputText [(ngModel)]="form.username" minlength="3" maxlength="50" autocomplete="username" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-sm font-medium">Phone Number <span class="text-red-500">*</span></label>
                <input pInputText type="tel" [(ngModel)]="form.phoneNumber" placeholder="(555) 555-5555" />
            </div>
            <div class="flex flex-col gap-1 md:col-span-2">
                <label class="text-sm font-medium">Address</label>
                <input pInputText [(ngModel)]="form.address" />
            </div>
        </div>

        <div class="mt-4 p-3 rounded text-sm" style="background:#eff6ff; border:1px solid #bfdbfe; color:#1e40af">
            <strong>Note:</strong> After you complete the registration, an email will be sent to the entered address with instructions to log in.
        </div>

        <p-button
            label="Register"
            icon="pi pi-user-plus"
            styleClass="w-full mt-4"
            [loading]="loading"
            [disabled]="!isValid"
            (onClick)="register()"
        />

    </div>
</div>
