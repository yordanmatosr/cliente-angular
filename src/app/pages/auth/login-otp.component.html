<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-y-auto py-4">
    <div class="flex flex-col items-center justify-center">
        <div class="login-card-wrapper">
            <div class="login-card bg-surface-0 dark:bg-surface-900 w-full px-8 sm:px-20">

                <div class="text-center mb-8">
                    <img src="/img/scoreit_logo.svg" alt="eScoreIT" class="login-logo" />
                </div>

                <div class="text-center mb-6">
                    <div class="otp-icon mx-auto mb-4">
                        <i class="pi pi-shield text-3xl text-primary"></i>
                    </div>
                    <h4 class="text-surface-900 dark:text-surface-0 font-bold text-2xl mb-1">Two-Factor Authentication</h4>
                    <span class="text-muted-color text-sm">
                        Enter the 6-digit code sent to your email.
                    </span>
                </div>

                @if (errorMessage) {
                    <p-message severity="error" [text]="errorMessage" styleClass="w-full mb-4" />
                }

                <label class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">
                    Verification Code
                </label>
                <input
                    pInputText
                    type="text"
                    placeholder="6-digit code"
                    class="w-full mb-6 text-center text-xl tracking-widest"
                    [(ngModel)]="otp"
                    maxlength="6"
                    (keyup.enter)="verify()"
                />

                <p-button
                    label="Verify Code"
                    icon="pi pi-check"
                    styleClass="w-full"
                    [loading]="loading"
                    [disabled]="!otp.trim()"
                    (onClick)="verify()"
                />

                <div class="text-center mt-4">
                    <p-button
                        [label]="cooldown > 0 ? 'Resend code in ' + cooldown + 's' : 'Resend code'"
                        [text]="true"
                        size="small"
                        [loading]="resending"
                        [disabled]="cooldown > 0 || resending"
                        (onClick)="resend()"
                    />
                </div>

                <div class="text-center mt-2">
                    <a routerLink="/auth/login" class="login-link">
                        <i class="pi pi-arrow-left text-xs mr-1"></i>Back to Login
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
