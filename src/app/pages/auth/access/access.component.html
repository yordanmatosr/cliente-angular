<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-col items-center justify-center">
        <div class="auth-card-wrapper auth-card-wrapper--warn">
            <div class="auth-card bg-surface-0 dark:bg-surface-900 w-full py-20 px-8 sm:px-20 flex flex-col items-center">
                <div class="gap-4 flex flex-col items-center">
                    <div class="flex justify-center items-center border-2 border-orange-500 rounded-full auth-icon-circle">
                        <i class="text-orange-500 pi pi-fw pi-lock text-2xl!"></i>
                    </div>
                    <h1 class="text-surface-900 dark:text-surface-0 font-bold text-4xl lg:text-5xl mb-2">Access Denied</h1>
                    <span class="text-muted-color mb-8">You do not have the necessary permissions. Please contact your administrator.</span>
                    <img src="https://primefaces.org/cdn/templates/sakai/auth/asset-access.svg" alt="Access denied" class="mb-8" width="80%" />
                    <div class="col-span-12 mt-8 text-center">
                        <p-button label="Go to Dashboard" routerLink="/" severity="warn" />
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
