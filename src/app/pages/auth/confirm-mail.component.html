<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen">
    <div class="flex flex-col items-center justify-center text-center px-6 gap-4 max-w-sm">

        <img src="/img/scoreit_logo.svg" alt="eScoreIT" style="max-width:200px; height:auto" />

        <div class="confirm-icon">
            <i class="pi pi-envelope text-4xl text-primary"></i>
        </div>

        <h4 class="text-surface-900 dark:text-surface-0 font-bold text-2xl m-0">
            Please check your email!
        </h4>

        <p class="text-muted-color text-sm m-0">
            An email has been sent to <strong class="text-surface-900 dark:text-surface-0">{{ email }}</strong>.
            Please click on the included link to continue.
        </p>

        <p-button
            label="Return to Login"
            icon="pi pi-arrow-left"
            severity="secondary"
            [outlined]="true"
            routerLink="/auth/login"
        />

    </div>
</div>
