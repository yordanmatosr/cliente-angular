<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-y-auto py-4">
    <div class="flex flex-col items-center justify-center">
        <div class="login-card-wrapper">
            <div class="login-card bg-surface-0 dark:bg-surface-900 w-full px-8 sm:px-20">

                <div class="text-center mb-8">
                    <img src="/img/scoreit_logo.svg" alt="eScoreIT" class="login-logo" />
                </div>

                <div class="text-center mb-6">
                    <h4 class="text-surface-900 dark:text-surface-0 font-bold text-2xl mb-1">Reset your password</h4>
                    <span class="text-muted-color text-sm">Enter and confirm your new password.</span>
                </div>

                @if (errorMessage) {
                    <p-message severity="error" [text]="errorMessage" styleClass="w-full mb-4" />
                }

                <label class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">New Password</label>
                <p-password
                    [(ngModel)]="password"
                    placeholder="New password"
                    [toggleMask]="true"
                    styleClass="mb-4 w-full"
                    inputStyleClass="w-full"
                />

                <label class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">Confirm Password</label>
                <p-password
                    [(ngModel)]="confirmPassword"
                    placeholder="Confirm password"
                    [feedback]="false"
                    [toggleMask]="true"
                    styleClass="mb-2 w-full"
                    inputStyleClass="w-full"
                />

                @if (confirmPassword && password !== confirmPassword) {
                    <p class="text-red-500 text-sm mb-4">Passwords do not match.</p>
                }
                @if (password && password.length < 6) {
                    <p class="text-red-500 text-sm mb-4">Password must be at least 6 characters.</p>
                }

                <p-button
                    label="Set Password"
                    icon="pi pi-lock"
                    styleClass="w-full mt-2"
                    [loading]="loading"
                    [disabled]="!isValid"
                    (onClick)="reset()"
                />

                <div class="text-center mt-5">
                    <a routerLink="/auth/login" class="login-link">
                        <i class="pi pi-arrow-left text-xs mr-1"></i>Back to Login
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
