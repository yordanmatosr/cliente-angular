<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-y-auto py-4">
    <div class="flex flex-col items-center justify-center">
        <div class="login-card-wrapper">
            <div class="login-card bg-surface-0 dark:bg-surface-900 w-full px-8 sm:px-20">

                <div class="text-center mb-8">
                    <img src="/img/scoreit_logo.svg" alt="eScoreIT" class="login-logo" />
                </div>

                @if (errorMessage) {
                    <p-message severity="error" [text]="errorMessage" styleClass="w-full mb-4" />
                }

                <div>
                    <label for="username" class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">Username</label>
                    <input pInputText id="username" type="text" placeholder="Username" class="w-full mb-6"
                           [(ngModel)]="username" (keyup.enter)="login()" />

                    <label for="password" class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2">Password</label>
                    <div (keyup.enter)="login()">
                        <p-password id="password" [(ngModel)]="password" placeholder="Password"
                                    [toggleMask]="true" styleClass="mb-6" [fluid]="true" [feedback]="false" />
                    </div>

                    <p-button label="Log In" styleClass="w-full" [loading]="loading" (onClick)="login()" />

                    <div class="flex justify-between mt-5">
                        <a routerLink="/auth/forgot-password" class="login-link">Forgot Password?</a>
                        <a routerLink="/auth/forgot-username" class="login-link">Forgot Username?</a>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
