<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-col items-center justify-center">
        <div style="border-radius: 56px; padding: 0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33,150,243,0) 30%)">
            <div class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20" style="border-radius: 53px">

                <div class="text-center mb-8">
                    <div class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-2">eScoreIT</div>
                    <span class="text-muted-color font-medium">Sign in to continue</span>
                </div>

                @if (errorMessage) {
                    <p-message severity="error" [text]="errorMessage" styleClass="w-full mb-4" />
                }

                <div>
                    <label for="username" class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">Username</label>
                    <input pInputText id="username" type="text" placeholder="Username" class="w-full md:w-120 mb-6"
                           [(ngModel)]="username" (keyup.enter)="login()" />

                    <label for="password" class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2">Password</label>
                    <div (keyup.enter)="login()">
                        <p-password id="password" [(ngModel)]="password" placeholder="Password"
                                    [toggleMask]="true" styleClass="mb-6" [fluid]="true" [feedback]="false" />
                    </div>

                    <p-button label="Sign In" styleClass="w-full" [loading]="loading" (onClick)="login()" />
                </div>
            </div>
        </div>
    </div>
</div>
