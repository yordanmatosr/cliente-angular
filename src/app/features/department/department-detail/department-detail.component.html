<p-toast />

<!-- Back button -->
<div class="mb-4">
    <p-button label="Back to Departments" icon="pi pi-arrow-left" severity="secondary" [outlined]="true" routerLink="/group" />
</div>

<!-- Department summary card -->
<div class="card mb-4">
    @if (loading()) {
        <div class="flex justify-center py-8">
            <p-progressspinner />
        </div>
    } @else if (department()) {
        <div class="flex flex-col gap-3">
            <div class="flex items-center justify-between">
                <h3 class="m-0">{{ department().departmentName }}</h3>
                <span class="text-sm text-muted-color">
                    {{ department().organization?.organizationName }}
                </span>
            </div>
            <hr class="border-surface-200 dark:border-surface-700" />
            <div>
                <span class="font-medium text-muted-color">Description</span>
                <p class="mt-1">{{ department().description || '—' }}</p>
            </div>
        </div>
    }
</div>

<!-- Users / Clinicians (Phase 6) -->
<div class="card">
    <div class="flex items-center gap-2 mb-4">
        <i class="pi pi-users text-xl text-muted-color"></i>
        <h4 class="m-0">Clinicians</h4>
    </div>
    <p class="text-muted-color text-sm">Clinician list will be available in the next phase.</p>
</div>
